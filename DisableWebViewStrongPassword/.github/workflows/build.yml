name: Build Rootless Package

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install ldid xz make

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-v1

      - name: Set up Theos (clone + patched SDKs)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone --quiet --recursive https://github.com/theos/theos.git "$THEOS"
          curl -fsSL https://github.com/theos/sdks/archive/refs/heads/master.zip -o /tmp/sdks.zip
          unzip -q /tmp/sdks.zip -d /tmp
          mv /tmp/sdks-master/*.sdk "$THEOS/sdks/"

      - name: Build rootless .deb
        run: |
          set -euo pipefail
          # gmake = GNU make from brew; Theos requires GNU make.
          gmake clean
          gmake package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1

      - name: Show produced packages
        run: ls -lh packages/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: DisableWebViewStrongPassword-rootless-deb
          path: packages/*.deb
          if-no-files-found: error
